name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
      - name: Build
        run: |
          mkdir -p dist
          OUTPUT=bili-danmaku-tui-linux-${{ matrix.goarch }}
          GOOS=linux GOARCH=${{ matrix.goarch }} \
          go build -o dist/$OUTPUT main.go
      - name: Package
        run: |
          cd dist
          for file in *; do
            tar -czf "$file.tar.gz" "$file"
          done
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
